name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A6F433: ${{ secrets.A6F433 }}
          B70285: ${{ secrets.B70285 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A6F433', ''), os.environ.get('B70285', '')
          html = pathlib.Path('index.html')
          text = html.read_text(encoding='utf-8')
          patched = text
          if a:
              patched = patched.replace('<!-- f2cdef0c1dd9db31d9fe0f -->', a)
          if b:
              patched = patched.replace('<!-- 1b80a36d6d96c2be20d12469 -->', b)
          if patched == text and (a or b):
              sys.exit(1)
          if patched != text:
              html.write_text(patched, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
